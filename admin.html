<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Formación Manipulador · Bonita Menorca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --cream: #f5f0e6;
    --cream-soft: #faf6ed;
    --ink: #1a2332;
    --ink-soft: #3d4a5c;
    --terracotta: #c4593a;
    --sea: #2c5f6f;
    --olive: #6b7a3f;
    --gold: #c89b4a;
    --rule: #d8cfb8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.5;
    font-size: 14px;
  }
  .top-bar {
    background: var(--ink);
    color: var(--cream);
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .brand { font-family: 'Fraunces', serif; font-size: 18px; }
  .brand em { color: var(--gold); font-style: normal; }
  .top-bar .user { font-size: 13px; color: rgba(245,240,230,0.7); }
  .top-bar button {
    background: transparent;
    color: var(--cream);
    border: 1px solid rgba(245,240,230,0.3);
    padding: 6px 14px;
    border-radius: 3px;
    font-size: 12px;
    cursor: pointer;
  }
  .top-bar button:hover { background: rgba(245,240,230,0.1); }

  .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* Login */
  .login-card {
    max-width: 400px;
    margin: 80px auto;
    background: var(--cream-soft);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 40px;
  }
  .login-card h1 {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    margin-bottom: 8px;
  }
  .login-card .sub { color: var(--ink-soft); margin-bottom: 24px; font-size: 13px; }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 6px;
    font-weight: 500;
  }
  input, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    font-family: inherit;
    font-size: 14px;
    background: white;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--sea);
    box-shadow: 0 0 0 3px rgba(44,95,111,0.12);
  }
  .btn {
    background: var(--terracotta);
    color: var(--cream);
    border: none;
    padding: 10px 20px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .btn:hover { background: #a64729; }
  .btn-block { width: 100%; padding: 12px; }
  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--rule);
  }
  .btn-secondary:hover { background: var(--cream-soft); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--cream-soft);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 20px;
  }
  .stat-card .lbl {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .stat-card .num {
    font-family: 'Fraunces', serif;
    font-size: 32px;
    font-weight: 500;
  }
  .stat-card.success .num { color: var(--olive); }
  .stat-card.warn .num { color: var(--terracotta); }
  .stat-card.info .num { color: var(--sea); }

  /* Filters */
  .filters {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filters input, .filters select {
    padding: 8px 12px;
    font-size: 13px;
    width: auto;
  }
  .filters input { min-width: 240px; }

  /* Table */
  .table-wrapper {
    background: var(--cream-soft);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--ink);
    color: var(--cream);
    padding: 12px;
    text-align: left;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  td {
    padding: 10px 12px;
    border-top: 1px solid var(--rule);
    vertical-align: middle;
  }
  tr:hover td { background: rgba(196,89,58,0.04); }
  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.aprobado { background: rgba(107,122,63,0.15); color: var(--olive); }
  .badge.iniciado { background: rgba(44,95,111,0.15); color: var(--sea); }
  .badge.suspenso_intento { background: rgba(200,155,74,0.18); color: #8b6a1f; }
  .badge.suspenso_definitivo { background: rgba(196,89,58,0.15); color: var(--terracotta); }

  .action-btn {
    background: transparent;
    border: 1px solid var(--rule);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 12px;
    color: var(--ink);
    margin-right: 4px;
  }
  .action-btn:hover { background: var(--cream); border-color: var(--ink); }

  .empty { padding: 40px; text-align: center; color: var(--ink-soft); }

  .alert { padding: 12px; border-radius: 3px; margin-bottom: 16px; font-size: 13px; }
  .alert.error { background: rgba(196,89,58,0.1); color: #a64729; border: 1px solid rgba(196,89,58,0.3); }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 24px;
  }
  .header-row h1 {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 500;
  }

  @media (max-width: 800px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .filters input { min-width: 100%; }
    .container { padding: 16px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">Bonita Menorca <em>·</em> Formación Manipulador · Admin</div>
  <div>
    <span class="user" id="userEmail"></span>
    <button onclick="logout()" id="logoutBtn" style="display: none; margin-left: 12px;">Cerrar sesión</button>
  </div>
</div>

<div class="container">
  <!-- LOGIN -->
  <div id="loginScreen">
    <div class="login-card">
      <h1>Acceso administrador</h1>
      <p class="sub">Solo personal autorizado de Bonita Menorca SL.</p>
      <div id="loginAlert"></div>
      <form id="loginForm" onsubmit="login(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" required>
        </div>
        <button class="btn btn-block" type="submit" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display: none;">
    <div class="header-row">
      <h1>Inscripciones</h1>
      <div>
        <button class="btn btn-secondary" onclick="exportarCSV()">Exportar CSV</button>
        <button class="btn" onclick="cargarDatos()">Actualizar</button>
      </div>
    </div>

    <div class="stats" id="statsContainer"></div>

    <div class="filters">
      <input type="text" id="filterText" placeholder="Buscar por nombre, DNI, email..." oninput="aplicarFiltros()">
      <select id="filterCentro" onchange="aplicarFiltros()">
        <option value="">Todos los centros</option>
        <option>Bodega Binifadet</option>
        <option>Restaurante Binifadet</option>
        <option>Tienda y Visitas Binifadet</option>
        <option>Restaurante Tamarindos</option>
        <option>Bar Tamarindos</option>
        <option>Casa Tirant</option>
        <option>Cocina Central</option>
        <option>Estructura / Oficina</option>
        <option>Otro</option>
      </select>
      <select id="filterEstado" onchange="aplicarFiltros()">
        <option value="">Todos los estados</option>
        <option value="iniciado">Iniciado</option>
        <option value="aprobado">Aprobado</option>
        <option value="suspenso_intento">Suspenso (puede reintentar)</option>
        <option value="suspenso_definitivo">Suspenso definitivo</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table id="inscripcionesTable">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>DNI</th>
            <th>Email</th>
            <th>Centro</th>
            <th>Puesto</th>
            <th>Estado</th>
            <th>Nota</th>
            <th>Certificado</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="inscripcionesBody">
          <tr><td colspan="9" class="empty">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
// CONFIGURACIÓN — debe coincidir con la del curso
const SUPABASE_URL = 'https://fdvluiiivalsxezdsbrz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_RmwOFHgfp4KI2HyT10OoPg_p7m3LUr6';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allData = [];

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    showDashboard(session.user.email);
    cargarDatos();
  } else {
    document.getElementById('loginScreen').style.display = 'block';
  }
}

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const alertBox = document.getElementById('loginAlert');
  alertBox.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    alertBox.innerHTML = `<div class="alert error">${error.message}</div>`;
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  showDashboard(data.user.email);
  cargarDatos();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

function showDashboard(email) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('userEmail').textContent = email;
  document.getElementById('logoutBtn').style.display = 'inline-block';
}

async function cargarDatos() {
  const { data, error } = await sb
    .from('v_inscripciones_resumen')
    .select('*')
    .order('fecha_inscripcion', { ascending: false });

  if (error) {
    document.getElementById('inscripcionesBody').innerHTML =
      `<tr><td colspan="9" class="empty">Error: ${error.message}</td></tr>`;
    return;
  }

  allData = data || [];
  renderStats();
  aplicarFiltros();
}

function renderStats() {
  const total = allData.length;
  const aprobados = allData.filter(d => d.estado === 'aprobado').length;
  const enCurso = allData.filter(d => d.estado === 'iniciado').length;
  const suspensos = allData.filter(d => d.estado === 'suspenso_definitivo').length;

  document.getElementById('statsContainer').innerHTML = `
    <div class="stat-card info">
      <div class="lbl">Total inscripciones</div>
      <div class="num">${total}</div>
    </div>
    <div class="stat-card success">
      <div class="lbl">Aprobados</div>
      <div class="num">${aprobados}</div>
    </div>
    <div class="stat-card">
      <div class="lbl">En curso</div>
      <div class="num">${enCurso}</div>
    </div>
    <div class="stat-card warn">
      <div class="lbl">Suspensos definitivos</div>
      <div class="num">${suspensos}</div>
    </div>
  `;
}

function aplicarFiltros() {
  const text = document.getElementById('filterText').value.toLowerCase();
  const centro = document.getElementById('filterCentro').value;
  const estado = document.getElementById('filterEstado').value;

  let filtered = allData;
  if (text) {
    filtered = filtered.filter(d =>
      (d.nombre_completo && d.nombre_completo.toLowerCase().includes(text)) ||
      (d.dni && d.dni.toLowerCase().includes(text)) ||
      (d.email && d.email.toLowerCase().includes(text)) ||
      (d.codigo_certificado && d.codigo_certificado.toLowerCase().includes(text))
    );
  }
  if (centro) filtered = filtered.filter(d => d.centro_trabajo === centro);
  if (estado) filtered = filtered.filter(d => d.estado === estado);

  renderTabla(filtered);
}

function renderTabla(data) {
  const tbody = document.getElementById('inscripcionesBody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">No hay registros que coincidan con los filtros.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(d => {
    const fecha = new Date(d.fecha_inscripcion).toLocaleDateString('es-ES');
    const estadoLabel = {
      iniciado: 'En curso',
      aprobado: 'Aprobado',
      suspenso_intento: 'Suspenso (reintentable)',
      suspenso_definitivo: 'Suspenso definitivo'
    }[d.estado] || d.estado;
    return `
      <tr>
        <td><strong>${d.nombre_completo}</strong><br><span style="color: var(--ink-soft); font-size: 12px;">${d.telefono}</span></td>
        <td>${d.dni}</td>
        <td><a href="mailto:${d.email}" style="color: var(--sea);">${d.email}</a></td>
        <td>${d.centro_trabajo}</td>
        <td>${d.puesto}</td>
        <td><span class="badge ${d.estado}">${estadoLabel}</span></td>
        <td>${d.nota_final !== null && d.nota_final !== undefined ? d.nota_final + '/20' : '—'}</td>
        <td>${d.codigo_certificado || '—'}</td>
        <td>${fecha}</td>
      </tr>
    `;
  }).join('');
}

function exportarCSV() {
  const text = document.getElementById('filterText').value.toLowerCase();
  const centro = document.getElementById('filterCentro').value;
  const estado = document.getElementById('filterEstado').value;

  let data = allData;
  if (text) {
    data = data.filter(d =>
      (d.nombre_completo && d.nombre_completo.toLowerCase().includes(text)) ||
      (d.dni && d.dni.toLowerCase().includes(text)) ||
      (d.email && d.email.toLowerCase().includes(text))
    );
  }
  if (centro) data = data.filter(d => d.centro_trabajo === centro);
  if (estado) data = data.filter(d => d.estado === estado);

  const headers = ['Nombre', 'DNI', 'Email', 'Teléfono', 'Centro', 'Puesto', 'Estado', 'Nota', 'Código certificado', 'Fecha certificado', 'Fecha inscripción'];
  const rows = data.map(d => [
    d.nombre_completo,
    d.dni,
    d.email,
    d.telefono,
    d.centro_trabajo,
    d.puesto,
    d.estado,
    d.nota_final ?? '',
    d.codigo_certificado ?? '',
    d.fecha_certificado ? new Date(d.fecha_certificado).toLocaleDateString('es-ES') : '',
    new Date(d.fecha_inscripcion).toLocaleDateString('es-ES')
  ]);

  const csv = [headers, ...rows].map(r =>
    r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(';')
  ).join('\n');

  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `manipulador_alimentos_${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

init();
</script>

</body>
</html>
